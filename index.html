<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zimbabwe Fuel Price Tracker (ZERA)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
        }

        .price-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .fuel-info {
            text-align: left;
        }

        .fuel-name {
            font-weight: bold;
            color: var(--primary);
            font-size: 18px;
        }

        .fuel-zig {
            color: #7f8c8d;
            font-size: 14px;
        }

        .price-tag {
            text-align: right;
        }

        .usd-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
        }

        .zig-price {
            font-size: 14px;
            color: var(--accent);
            font-weight: bold;
        }

        .calculator {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            text-align: left;
        }

        .calculator h3 {
            margin-top: 0;
            font-size: 16px;
            color: var(--primary);
        }

        .calc-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            flex-grow: 1;
        }

        .calc-result {
            font-weight: bold;
            color: var(--secondary);
            font-size: 18px;
        }

        .history-section {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .history-section h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 16px;
            color: var(--primary);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }

        .badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="badge">OFFICIAL DATA (ZERA)</div>
            <h1>Zimbabwe Fuel Pulse</h1>
            <p id="update-date">Loading data...</p>
        </div>

        <!-- Petrol Card -->
        <div class="price-card">
            <div class="fuel-info">
                <div class="fuel-name">Petrol (E5)</div>
                <div class="fuel-zig">ZERA Regulated</div>
            </div>
            <div class="price-tag">
                <div class="usd-price" id="petrol-usd">--</div>
                <div class="zig-price" id="petrol-zig">--</div>
            </div>
        </div>

        <!-- Diesel Card -->
        <div class="price-card">
            <div class="fuel-info">
                <div class="fuel-name">Diesel (D50)</div>
                <div class="fuel-zig">ZERA Regulated</div>
            </div>
            <div class="price-tag">
                <div class="usd-price" id="diesel-usd">--</div>
                <div class="zig-price" id="diesel-zig">--</div>
            </div>
        </div>

        <div class="calculator">
            <h3>Tank Cost Calculator</h3>
            <div class="calc-group">
                <input type="number" id="liters" value="60" placeholder="Liters">
                <select id="fuel-type">
                    <option value="petrol">Petrol</option>
                    <option value="diesel">Diesel</option>
                </select>
            </div>
            <div class="calc-result" id="total-cost">Total: $0.00</div>
        </div>

        <div class="history-section">
            <h3>Price Trends (USD)</h3>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="footer">
            <button id="whatsapp-btn" style="background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Share Prices on WhatsApp
            </button>
            <p>Data automatically synced with www.zera.co.zw</p>
            <p>© 2026 Naboth Sithole - Zimbabwe Tech Projects</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let fuelData = null;
        let historyData = null;

        async function updateUI() {
            try {
                // Fetch current data
                const response = await fetch('data.json');
                fuelData = await response.json();

                document.getElementById('update-date').innerText = `Updated: ${fuelData.last_updated}`;
                document.getElementById('petrol-usd').innerText = `$${fuelData.petrol.usd}`;
                document.getElementById('petrol-zig').innerText = `ZiG ${fuelData.petrol.zig}`;
                document.getElementById('diesel-usd').innerText = `$${fuelData.diesel.usd}`;
                document.getElementById('diesel-zig').innerText = `ZiG ${fuelData.diesel.zig}`;

                calculate();

                // Fetch history for chart
                const histResponse = await fetch('history.json');
                historyData = await histResponse.json();
                renderChart(historyData);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('update-date').innerText = 'Error loading data';
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [
                        {
                            label: 'Petrol',
                            data: data.map(d => d.petrol),
                            borderColor: '#e74c3c',
                            tension: 0.3,
                            fill: false
                        },
                        {
                            label: 'Diesel',
                            data: data.map(d => d.diesel),
                            borderColor: '#2c3e50',
                            tension: 0.3,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'USD Price' }
                        }
                    }
                }
            });
        }

        function calculate() {
            if (!fuelData) return;
            const liters = document.getElementById('liters').value;
            const type = document.getElementById('fuel-type').value;
            const price = fuelData[type].usd;
            const total = (liters * price).toFixed(2);
            document.getElementById('total-cost').innerText = `Total: $${total} USD`;
        }

        document.getElementById('whatsapp-btn').addEventListener('click', () => {
            if (!fuelData) return;
            const text = `🇿🇼 Zimbabwe Fuel Update (${fuelData.last_updated}):\n\n⛽ Petrol (E5): $${fuelData.petrol.usd} (ZiG ${fuelData.petrol.zig})\n⛽ Diesel (D50): $${fuelData.diesel.usd} (ZiG ${fuelData.diesel.zig})\n\nCheck live updates here:\n${window.location.href}`;
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        });

        document.getElementById('liters').addEventListener('input', calculate);
        document.getElementById('fuel-type').addEventListener('change', calculate);

        updateUI();
    </script>
</body>
</html>
